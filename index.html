<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify-page</title>
    <link
      rel="stylesheet"
      href="bootstrap.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header">
        <h2>AOREXA</h2>
        <p>Open Your Account- It take 3 min</p>
      </div>
    </header>
    <section class="container box">
      <div class="box-header">
        <nav class="navbar">
          <span class="nav-btn-1"> 1. Identity</span>
          <span class="nav-btn-2"> 2. Address & Income</span>
          <span class="nav-btn-3"> 3. Document</span>
        </nav>
        <div class="progress">
          <div class="progress-fill"></div>
        </div>
      </div>
      <form class="form">
      <div class="mb-3 mt-5">
        <lable class="form-label"></lable>
            <input class="form-control form-control-lg" type="text" placeholder="Enter Full Name" required >
            </div>
        <div class="mb-3">
            <lable class="form-label p-3"></lable>
            <input class="form-control form-control-lg" type="email" placeholder="Email Address" required>
        </div>
        <div class="mb-3">
    <label for="mobile" class="form-label">
        Mobile number
    </label>

    <div class="input-group">
        <span class="input-group-text country-code">
            +91
        </span>

        <input type="tel" class="form-control" id="mobile"  placeholder="10-digit mobile" maxlength="10"  pattern="[0-9]{10}" required
        >
    </div>
</div>
        <div class="mb-3">
    <label for="PAN" class="form-label">
         PAN number
    </label>

    <div class="input-group">
        <span class="input-group-text">
            <i class="fa-solid fa-address-card"></i>
        </span>

        <input type="tel" class="form-control" id="mobile"  placeholder="10-digit mobile" maxlength="10"  pattern="[0-9]{10}" required
        >
    </div>
</div>
</form>
<div class="action-btn">
    <a href="#" class="back-btn"> Back</a>
    <a href="#" class="continue-btn"> Continue</a>
</div>

    </section>
  </body>
</html>
